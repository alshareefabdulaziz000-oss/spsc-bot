[phases.setup]
nixPkgs = ["python311", "gcc", "g++", "make"]

[phases.build]
cmds = [
  "pip install --upgrade pip",
  "pip install greenlet==3.1.1 --no-build-isolation",
  "pip install -r requirements.txt",
  "playwright install chromium",
  "playwright install-deps chromium"
]

[start]
cmd = "python bot.py"
